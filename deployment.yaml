apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-app
  namespace: orders-system
  annotations:
    secret.reloader.stakater.com/reload: "rabbitmq-client-cert"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orders-app
  template:
    metadata:
      labels:
        app: orders-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: orders-app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: app
        image: orders-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: metrics
          containerPort: 8000
        env:
        - name: RABBITMQ_HOST
          value: "rabbitmq-prod.rabbitmq.svc.cluster.local"
        - name: RABBITMQ_PORT
          value: "5671"
        - name: REDIS_HOST
          value: "redis-orders.orders-system.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: NUM_CONSUMERS
          value: "4"
        - name: NUM_PUBLISHERS
          value: "4"
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "2"
            memory: "1Gi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - name: certs
          mountPath: /etc/rabbitmq-certs
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: rabbitmq-client-cert
