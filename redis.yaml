apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-orders
  namespace: orders-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-orders
  template:
    metadata:
      labels:
        app: redis-orders
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-orders
  namespace: orders-system
spec:
  selector:
    app: redis-orders
  ports:
  - port: 6379
    targetPort: 6379
